name: Deploy site to public repo

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate site
        run: |
          python scripts/generate.py

      - name: Deploy to public repository
        env:
          TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/KurouzuSetsuna/photo-affiliate-hub.git public_repo
          rm -rf public_repo/*
          cp -r site/* public_repo/
          cd public_repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto deploy site"
          git push
